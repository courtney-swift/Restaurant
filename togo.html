            </nav>

    <main>
        <div>
        <div class="dish-month-img">

            <form>
                <!-- Example of input structure -->
                 <div class="input-control">
                    <label for="example">Example</label>
                    <input type="text" id="example" disabled/>
                </div>
                <!-- Start of mini Challenge-->

            <form>

    <form action="" method="">
        <label for="fname">First Name:</label>
        <input type="text" id="fname"/>

        <label for="mail">Email:</label>
        <input type="email" id="mail"><br/><br>
        <label>Payment Amount:</label>
        <input type="number" placeholder="$0.00"><br><br>
        <label for="card-number">Card Number:</label>
        <textarea id="card-number" rows="1" cols="50"></textarea><br/><br>
        <label for="Expiration-Date">Expiration Date:</label>
        <input type="date" id="Expiration-Date"><br/><br>
        <input type="submit" value="Submit"/>

        </div>
